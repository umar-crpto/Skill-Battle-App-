<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Skill Battle</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
}

.card {
  background: #1e1e1e;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 5px;
}

.vote { background: green; color: white; }
.unvote { background: red; color: white; }
.upload { background: blue; color: white; }

video {
  width: 90%;
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>⚔️ Skill Battle</h2>
<h3>⚽ Football vs 🎤 Singing</h3>

<div class="card">
  <h3 id="timer">⏳ Loading...</h3>
</div>
HTML
<button onclick="db.ref('test').set({ok:true})">
TEST FIREBASE
</button>
  
<div class="card">
  <h3>📤 Upload Video</h3>
  <input type="file" id="file"><br>
  <input id="name" placeholder="Your name"><br>
  <input id="side" placeholder="Football or Singing"><br>
  <button class="upload" onclick="uploadVideo()">Upload</button>
</div>

<div class="card">
  <h3>🎥 Videos</h3>
  <div id="videos"></div>
</div>

<div class="card">
  <h3>🗳️ Vote</h3>

  <p>⚽ Football: <span id="fVotes">0</span></p>
  <button class="vote" onclick="vote('football')">Vote</button>
  <button class="unvote" onclick="unvote()">Unvote</button>

  <p>🎤 Singing: <span id="sVotes">0</span></p>
  <button class="vote" onclick="vote('singing')">Vote</button>
</div>

<div class="card">
  <h3>🏆 Winner</h3>
  <p id="winner"></p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDaMzXq5V2c1KIeb_n-4FRx5zvRqU5mGYg",
  authDomain: "skill-battle-app-1.firebaseapp.com",
  databaseURL: "https://skill-battle-app-1-default-rtdb.firebaseio.com",
  projectId: "skill-battle-app-1",
  storageBucket: "skill-battle-app-1.firebasestorage.app",
  messagingSenderId: "225198548387",
  appId: "1:225198548387:web:81078805f48d021603a616"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const storage = firebase.storage();

/* ---------------- USER ID SYSTEM ---------------- */

let userId = localStorage.getItem("userId");

if (!userId) {
  userId = "user_" + Math.random().toString(36).substr(2, 9);
  localStorage.setItem("userId", userId);
}

/* ---------------- VIDEO UPLOAD ---------------- */

function uploadVideo() {
  let file = document.getElementById("file").files[0];
  let name = document.getElementById("name").value;
  let side = document.getElementById("side").value;

  if (!file || !name || !side) {
    alert("Fill all fields");
    return;
  }

  let ref = storage.ref("videos/" + Date.now());

  ref.put(file).then(() => {
    ref.getDownloadURL().then(url => {
      db.ref("videos").push({
        name: name,
        side: side,
        url: url
      });
      alert("Uploaded!");
    });
  });
}

/* ---------------- LOAD VIDEOS ---------------- */

db.ref("videos").on("value", snap => {
  let data = snap.val() || {};
  let box = document.getElementById("videos");
  box.innerHTML = "";

  for (let id in data) {
    let v = data[id];
    box.innerHTML += `
      <div>
        <b>${v.name}</b> - ${v.side}<br>
        <video controls src="${v.url}"></video>
      </div>
    `;
  }
});

/* ---------------- VOTING SYSTEM FIXED ---------------- */

function vote(choice) {
  db.ref("votes/" + userId).set(choice);
}

function unvote() {
  db.ref("votes/" + userId).remove();
}

/* ---------------- COUNT VOTES ---------------- */

db.ref("votes").on("value", snap => {

  let data = snap.val() || {};

  let football = 0;
  let singing = 0;

  for (let user in data) {
    if (data[user] === "football") football++;
    if (data[user] === "singing") singing++;
  }

  document.getElementById("fVotes").innerText = football;
  document.getElementById("sVotes").innerText = singing;

  updateWinner(football, singing);
});

/* ---------------- WINNER ---------------- */

function updateWinner(f, s) {
  let winner = "";

  if (f > s) winner = "⚽ Football is winning";
  else if (s > f) winner = "🎤 Singing is winning";
  else winner = "⚔️ Tie";

  document.getElementById("winner").innerText = winner;
}

/* ---------------- TIMER (1 HOUR) ---------------- */

let endTime = localStorage.getItem("endTime");

if (!endTime) {
  endTime = Date.now() + (60 * 60 * 1000);
  localStorage.setItem("endTime", endTime);
}

function updateTimer() {

  let remaining = endTime - Date.now();

  if (remaining <= 0) {
    document.getElementById("timer").innerText = "🔥 Battle Ended!";
    return;
  }

  let m = Math.floor(remaining / 60000);
  let s = Math.floor((remaining % 60000) / 1000);

  document.getElementById("timer").innerText = `⏳ ${m}m ${s}s`;
}

setInterval(updateTimer, 1000);
updateTimer();

</script>

</body>
</html>
