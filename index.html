<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Skill Battle</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
}

.card {
  background: #1e1e1e;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 5px;
}

.vote { background: green; color: white; }
.unvote { background: red; color: white; }
.upload { background: blue; color: white; }

video {
  width: 90%;
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>⚔️ Skill Battle</h2>
<h3>⚽ Football vs 🎤 Singing</h3>

<div class="card">
  <h3 id="timer">⏳ Loading...</h3>
</div>

<div class="card">
  <h3>📤 Upload Video</h3>
  <input type="file" id="file"><br>
  <input id="name" placeholder="Your name"><br>
  <input id="side" placeholder="Football or Singing"><br>
  <button class="upload" onclick="uploadVideo()">Upload</button>
</div>

<div class="card">
  <h3>🎥 Videos</h3>
  <div id="videos"></div>
</div>

<div class="card">
  <h3>🗳️ Vote</h3>

  <p>⚽ Football: <span id="fVotes">0</span></p>
  <button class="vote" onclick="vote('football')">Vote</button>
  <button class="unvote" onclick="unvote('football')">Unvote</button>

  <p>🎤 Singing: <span id="sVotes">0</span></p>
  <button class="vote" onclick="vote('singing')">Vote</button>
  <button class="unvote" onclick="unvote('singing')">Unvote</button>
</div>

<div class="card">
  <h3>🏆 Winner</h3>
  <p id="winner"></p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDaMzXq5V2c1KIeb_n-4FRx5zvRqU5mGYg",
  authDomain: "skill-battle-app-1.firebaseapp.com",
  projectId: "skill-battle-app-1",
  storageBucket: "skill-battle-app-1.firebasestorage.app",
  messagingSenderId: "225198548387",
  appId: "1:225198548387:web:81078805f48d021603a616"
};

firebase.initializeApp(firebaseConfig);

const storage = firebase.storage();
const db = firebase.database();

let userVote = localStorage.getItem("userVote") || "";

// UPLOAD VIDEO
function uploadVideo() {
  let file = document.getElementById("file").files[0];
  let name = document.getElementById("name").value;
  let side = document.getElementById("side").value;

  if (!file || !name || !side) {
    alert("Fill all fields");
    return;
  }

  let ref = storage.ref("videos/" + Date.now());

  ref.put(file).then(() => {
    ref.getDownloadURL().then(url => {

      db.ref("videos").push({
        name: name,
        side: side,
        url: url
      });

      alert("Uploaded!");
    });
  });
}

// LOAD VIDEOS
db.ref("videos").on("value", snap => {
  let data = snap.val();
  let box = document.getElementById("videos");
  box.innerHTML = "";

  for (let id in data) {
    let v = data[id];

    box.innerHTML += `
      <div>
        <b>${v.name}</b> - ${v.side}<br>
        <video controls src="${v.url}"></video>
      </div>
    `;
  }
});

// VOTING SYSTEM (FIXED)
db.ref("votes").on("value", snap => {
  let data = snap.val() || { football: 0, singing: 0 };

  document.getElementById("fVotes").innerText = data.football;
  document.getElementById("sVotes").innerText = data.singing;

  updateWinner(data);
});

function vote(type) {

  if (userVote === type) return;

  db.ref("votes").once("value").then(snap => {

    let data = snap.val() || { football: 0, singing: 0 };

    if (userVote === "football") data.football--;
    if (userVote === "singing") data.singing--;

    if (type === "football") data.football++;
    if (type === "singing") data.singing++;

    db.ref("votes").set(data);

    userVote = type;
    localStorage.setItem("userVote", type);
  });
}

function unvote(type) {

  if (userVote !== type) return;

  db.ref("votes").once("value").then(snap => {

    let data = snap.val() || { football: 0, singing: 0 };

    if (type === "football") data.football--;
    if (type === "singing") data.singing--;

    db.ref("votes").set(data);

    userVote = "";
    localStorage.removeItem("userVote");
  });
}

function updateWinner(data) {
  let winner = "";

  if (data.football > data.singing) winner = "⚽ Football is winning";
  else if (data.singing > data.football) winner = "🎤 Singing is winning";
  else winner = "⚔️ Tie";

  document.getElementById("winner").innerText = winner;
}

// 1 HOUR TIMER
let endTime = localStorage.getItem("endTime");

if (!endTime) {
  endTime = Date.now() + (60 * 60 * 1000);
  localStorage.setItem("endTime", endTime);
}

function updateTimer() {

  let now = Date.now();
  let remaining = endTime - now;

  if (remaining <= 0) {
    document.getElementById("timer").innerText = "🔥 Battle Ended!";
    announceWinner();
    return;
  }

  let minutes = Math.floor(remaining / 60000);
  let seconds = Math.floor((remaining % 60000) / 1000);

  let text = `⏳ ${minutes}m ${seconds}s`;

  if (remaining < 600000) text = `🔥 Ending Soon! ${minutes}m ${seconds}s`;
  if (remaining < 60000) text = `🚨 FINAL ${seconds}s`;

  document.getElementById("timer").innerText = text;
}

setInterval(updateTimer, 1000);
updateTimer();

// ANNOUNCE WINNER + RESET
function announceWinner() {

  db.ref("votes").once("value").then(snap => {
    let data = snap.val() || { football: 0, singing: 0 };

    let result = "";

    if (data.football > data.singing)
      result = "🏆 WINNER: Football";
    else if (data.singing > data.football)
      result = "🏆 WINNER: Singing";
    else
      result = "🏆 Tie";

    document.getElementById("winner").innerText = result;

    setTimeout(() => {
      db.ref("votes").set({ football: 0, singing: 0 });

      let newTime = Date.now() + (60 * 60 * 1000);
      localStorage.setItem("endTime", newTime);

    }, 5000);
  });
}

</script>

</body>
</html>
