<!DOCTYPE html>
<html>
<head>
  <title>Skill Battle App</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    #feed {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .card {
      height: 100vh;
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      background: #ff0050;
      color: white;
    }

    video, img, audio {
      width: 100%;
      margin-top: 10px;
    }

    #joinModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      padding: 20px;
    }
  </style>
</head>

<body>

<h2>Create Battle</h2>
<input id="creatorA" placeholder="Creator A name">
<input id="optionA" placeholder="Option A">
<input id="creatorB" placeholder="Creator B name">
<input id="optionB" placeholder="Option B">
<button onclick="createBattle()">Start Battle</button>

<div id="feed"></div>

<!-- JOIN MODAL -->
<div id="joinModal">
  <h2>Join Battle</h2>

  <select id="team">
    <option value="A">Team A</option>
    <option value="B">Team B</option>
  </select>

  <input type="file" id="fileInput" accept="video/*,image/*,audio/*">

  <button onclick="submitEntry()">Upload</button>
  <button onclick="closeJoin()">Cancel</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDaMzXq5V2c1KIeb_n-4FRx5zvRqU5mGYg",
  authDomain: "skill-battle-app-1.firebaseapp.com",
  databaseURL: "https://skill-battle-app-1-default-rtdb.firebaseio.com",
  projectId: "skill-battle-app-1",
  storageBucket: "skill-battle-app-1.firebasestorage.app",
  messagingSenderId: "225198548387",
  appId: "1:225198548387:web:b31d3a34db52263303a616"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const storage = firebase.storage();

let currentBattle = null;

// USER ID
const userId = localStorage.getItem("userId") || Date.now().toString();
localStorage.setItem("userId", userId);

// CREATE BATTLE
function createBattle() {
  const id = Date.now();
  const creatorA = document.getElementById("creatorA").value;
  const creatorB = document.getElementById("creatorB").value;
  const optionA = document.getElementById("optionA").value;
  const optionB = document.getElementById("optionB").value;

  db.ref("battles/" + id).set({
    creatorA,
    creatorB,
    optionA,
    optionB,
    createdAt: Date.now(),
    endTime: Date.now() + 3600000
  });
}

// LOAD BATTLES (SCROLL FEED)
db.ref("battles").on("value", snap => {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  const battles = snap.val() || {};

  Object.entries(battles).forEach(([id, b]) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h2>${b.creatorA} (${b.optionA}) VS ${b.creatorB} (${b.optionB})</h2>

      <p id="votes-${id}">Votes loading...</p>

      <button onclick="vote('${id}','A')">Vote A</button>
      <button onclick="vote('${id}','B')">Vote B</button>

      <button onclick="openJoin('${id}')">⚔️ Join Battle</button>

      <div id="uploads-${id}"></div>
    `;

    feed.appendChild(div);

    loadVotes(id);
    loadUploads(id);
  });
});

// VOTING
function vote(id, choice) {
  db.ref("votes/" + id + "/" + userId).set(choice);
}

function loadVotes(id) {
  db.ref("votes/" + id).on("value", snap => {
    const data = snap.val() || {};
    let a = 0, b = 0;

    Object.values(data).forEach(v => {
      if (v === "A") a++;
      else b++;
    });

    document.getElementById("votes-" + id).innerText =
      "A: " + a + " | B: " + b;
  });
}

// JOIN
function openJoin(id) {
  currentBattle = id;
  document.getElementById("joinModal").style.display = "block";
}

function closeJoin() {
  document.getElementById("joinModal").style.display = "none";
}

// UPLOAD
function submitEntry() {
  const file = document.getElementById("fileInput").files[0];
  const team = document.getElementById("team").value;

  if (!file) return alert("Select file");

  const ref = storage.ref("uploads/" + currentBattle + "/" + userId + file.name);

  ref.put(file).then(snap => {
    snap.ref.getDownloadURL().then(url => {
      db.ref("uploads/" + currentBattle + "/" + userId).set({
        team,
        file: url,
        type: file.type
      });

      alert("Uploaded!");
      closeJoin();
    });
  });
}

// SHOW UPLOADS
function loadUploads(id) {
  db.ref("uploads/" + id).on("value", snap => {
    const data = snap.val() || {};
    const container = document.getElementById("uploads-" + id);
    container.innerHTML = "";

    Object.values(data).forEach(entry => {
      let el;

      if (entry.type.startsWith("video")) {
        el = document.createElement("video");
        el.controls = true;
      } else if (entry.type.startsWith("image")) {
        el = document.createElement("img");
      } else {
        el = document.createElement("audio");
        el.controls = true;
      }

      el.src = entry.file;
      container.appendChild(el);
    });
  });
}
</script>

</body>
</html>
