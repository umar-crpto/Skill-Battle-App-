<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Skill Battle</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
}

header {
  background: #1c1c1c;
  padding: 15px;
  font-size: 22px;
}

.card {
  background: #1e1e1e;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}

input {
  width: 80%;
  padding: 8px;
  margin: 5px;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 5px;
}

.vote { background: green; color: white; }
.submit { background: blue; color: white; }

.videoBox {
  background: black;
  padding: 10px;
  margin-top: 10px;
}

a { color: yellow; }
</style>
</head>

<body>

<header>⚔️ Skill Battle V2</header>

<div class="card">
  <h2 id="battleTitle">Loading battle...</h2>
</div>

<!-- SUBMIT VIDEO -->
<div class="card">
  <h3>📤 Submit Your Skill</h3>
  <input id="name" placeholder="Your name">
  <input id="side" placeholder="Football / Singing">
  <input id="video" placeholder="Video link (TikTok/YouTube)">
  <button class="submit" onclick="submit()">Submit</button>
</div>

<!-- VIDEOS -->
<div class="card">
  <h3>🎥 Battle Videos</h3>
  <div id="videos"></div>
</div>

<!-- VOTING -->
<div class="card">
  <h3>🗳️ Vote</h3>

  <p>⚽ Football: <span id="fVotes">0</span></p>
  <button class="vote" onclick="vote('football')">Vote Football</button>

  <p>🎤 Singing: <span id="sVotes">0</span></p>
  <button class="vote" onclick="vote('singing')">Vote Singing</button>
</div>

<!-- WINNER -->
<div class="card">
  <h3>🏆 Winner</h3>
  <p id="winner">No votes yet</p>
</div>

<script>

// DAILY BATTLE SYSTEM
let battles = [
  "⚽ Football vs 🎤 Singing",
  "🏀 Basketball vs 🎮 Gaming",
  "💃 Dance vs 🎤 Rap",
  "🎨 Art vs 📸 Photography",
  "🏃 Running vs 🧠 IQ Challenge"
];

// pick today’s battle
let todayIndex = new Date().getDate() % battles.length;
let todayBattle = battles[todayIndex];

document.getElementById("battleTitle").innerText = todayBattle;

// storage
let fVotes = localStorage.getItem("fVotes") || 0;
let sVotes = localStorage.getItem("sVotes") || 0;

let videos = JSON.parse(localStorage.getItem("videos")) || [];

function vote(type) {
  if (type === "football") fVotes++;
  if (type === "singing") sVotes++;

  save();
  update();
}

function submit() {
  let name = document.getElementById("name").value;
  let side = document.getElementById("side").value;
  let video = document.getElementById("video").value;

  if (!name || !side) {
    alert("Fill all fields");
    return;
  }

  videos.push({ name, side, video });
  localStorage.setItem("videos", JSON.stringify(videos));

  renderVideos();
  alert("Submitted!");
}

function renderVideos() {
  let box = document.getElementById("videos");
  box.innerHTML = "";

  if (videos.length === 0) {
    box.innerHTML = "No videos yet";
    return;
  }

  videos.forEach(v => {
    box.innerHTML += `
      <div class="videoBox">
        <p><b>${v.name}</b> - ${v.side}</p>
        <a href="${v.video}" target="_blank">Watch Video</a>
      </div>
    `;
  });
}

function update() {
  document.getElementById("fVotes").innerText = fVotes;
  document.getElementById("sVotes").innerText = sVotes;

  let winner = "";

  if (fVotes == sVotes) winner = "Tie ⚔️";
  else if (fVotes > sVotes) winner = "⚽ Football wins";
  else winner = "🎤 Singing wins";

  document.getElementById("winner").innerText = winner;

  save();
}

function save() {
  localStorage.setItem("fVotes", fVotes);
  localStorage.setItem("sVotes", sVotes);
}

renderVideos();
update();

</script>

</body>
</html>
