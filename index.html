<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Skill Battle Fixed</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
  margin: 0;
}

header {
  background: #1c1c1c;
  padding: 15px;
  font-size: 22px;
}

.card {
  background: #1e1e1e;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}

input {
  width: 80%;
  padding: 8px;
  margin: 5px;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.vote { background: green; color: white; }
.unvote { background: red; color: white; }
.submit { background: blue; color: white; }

.videoBox {
  background: #000;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}

a { color: yellow; }
</style>
</head>

<body>

<header>⚔️ Skill Battle App</header>

<div class="card">
  <h2>⚽ Football vs 🎤 Singing</h2>
</div>

<!-- SUBMIT ENTRY -->
<div class="card">
  <h3>📤 Submit Entry</h3>

  <input id="name" placeholder="Your name">
  <input id="side" placeholder="Football or Singing">
  <input id="video" placeholder="Video link (must start with https://)">

  <button class="submit" onclick="submitEntry()">Submit</button>
</div>

<!-- ENTRIES -->
<div class="card">
  <h3>🎥 Entries</h3>
  <div id="videos"></div>
</div>

<!-- VOTING -->
<div class="card">
  <h3>🗳️ Vote System</h3>

  <p>⚽ Football: <span id="fVotes">0</span></p>
  <button class="vote" onclick="vote('football')">Vote Football</button>
  <button class="unvote" onclick="unvote('football')">Unvote</button>

  <p>🎤 Singing: <span id="sVotes">0</span></p>
  <button class="vote" onclick="vote('singing')">Vote Singing</button>
  <button class="unvote" onclick="unvote('singing')">Unvote</button>
</div>

<!-- WINNER -->
<div class="card">
  <h3>🏆 Winner</h3>
  <p id="winner"></p>
</div>

<script>

let fVotes = parseInt(localStorage.getItem("fVotes")) || 0;
let sVotes = parseInt(localStorage.getItem("sVotes")) || 0;
let userVote = localStorage.getItem("userVote") || "";

let videos = JSON.parse(localStorage.getItem("videos")) || [];

/* SUBMIT ENTRY */
function submitEntry() {
  let name = document.getElementById("name").value;
  let side = document.getElementById("side").value.toLowerCase();
  let video = document.getElementById("video").value;

  if (!name || !side) {
    alert("Fill name and side");
    return;
  }

  // FIX: prevent fake links causing 404
  if (video && !video.startsWith("http")) {
    alert("Video link must start with https://");
    return;
  }

  videos.push({ name, side, video });
  localStorage.setItem("videos", JSON.stringify(videos));

  renderVideos();
  alert("Entry submitted!");
}

/* VOTE */
function vote(type) {

  if (userVote === type) return;

  if (userVote === "football") fVotes--;
  if (userVote === "singing") sVotes--;

  if (type === "football") fVotes++;
  if (type === "singing") sVotes++;

  userVote = type;

  save();
  update();
}

/* UNVOTE */
function unvote(type) {

  if (userVote !== type) return;

  if (type === "football") fVotes--;
  if (type === "singing") sVotes--;

  userVote = "";

  save();
  update();
}

/* SAVE */
function save() {
  localStorage.setItem("fVotes", fVotes);
  localStorage.setItem("sVotes", sVotes);
  localStorage.setItem("userVote", userVote);
}

/* UPDATE WINNER */
function update() {

  document.getElementById("fVotes").innerText = fVotes;
  document.getElementById("sVotes").innerText = sVotes;

  let winner = "";

  if (fVotes > sVotes) winner = "⚽ Football is winning";
  else if (sVotes > fVotes) winner = "🎤 Singing is winning";
  else winner = "Tie ⚔️";

  document.getElementById("winner").innerText = winner;
}

/* SHOW ENTRIES */
function renderVideos() {

  let box = document.getElementById("videos");
  box.innerHTML = "";

  if (videos.length === 0) {
    box.innerHTML = "No entries yet";
    return;
  }

  videos.forEach(v => {

    box.innerHTML += `
      <div class="videoBox">
        <b>${v.name}</b> - ${v.side}
        <br><br>
        ${
          v.video && v.video.startsWith("http")
          ? `<a href="${v.video}" target="_blank">▶ Watch Video</a>`
          : `<p style="color:red;">No valid video link</p>`
        }
      </div>
    `;
  });
}

renderVideos();
update();

</script>

</body>
</html>
